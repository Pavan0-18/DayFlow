[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_PRIVATE_STANDALONE = "false"
  SECRETS_SCAN_ENABLED = "false"

[[headers]]
  for = "/*"
  [headers.values]
    X-DNS-Prefetch-Control = "on"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
